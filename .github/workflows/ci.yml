name: CI

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "tests/**"
      - "pyproject.toml"
      - "pytest.ini"
      - "Makefile"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "app/**"
      - "tests/**"
      - "pyproject.toml"
      - "pytest.ini"
      - "Makefile"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

# Cancel in-progress runs for the same branch/PR — saves CI minutes on rapid pushes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        # Windows is significantly slower than Linux; only run it on push to main
        # (post-merge) to keep PR feedback fast.
        os: ${{ github.event_name == 'push' && fromJSON('["ubuntu-latest", "windows-latest"]') || fromJSON('["ubuntu-latest"]') }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: python -m ruff check app/ tests/

      - name: Format check with ruff
        run: python -m ruff format --check app/ tests/

  typecheck:
    name: typecheck (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        # Windows is significantly slower than Linux; only run it on push to main
        # (post-merge) to keep PR feedback fast.
        os: ${{ github.event_name == 'push' && fromJSON('["ubuntu-latest", "windows-latest"]') || fromJSON('["ubuntu-latest"]') }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Type check with mypy
        run: python -m mypy app/
        continue-on-error: false

  # ---------------------------------------------------------------
  # Test: runs only after quality (ruff) + typecheck pass (avoids wasting CI
  # minutes on a run that would be discarded anyway)
  # ---------------------------------------------------------------
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        # Windows is significantly slower than Linux; only run it on push to main
        # (post-merge) to keep PR feedback fast.
        os: ${{ github.event_name == 'push' && fromJSON('["ubuntu-latest", "windows-latest"]') || fromJSON('["ubuntu-latest"]') }}
    runs-on: ${{ matrix.os }}
    needs: [quality, typecheck]
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      JWT_TOKEN: ${{ secrets.JWT_TOKEN }}
      TRACER_ORG_ID: ${{ secrets.TRACER_ORG_ID }}
      TRACER_WEB_APP_URL: ${{ secrets.TRACER_WEB_APP_URL }}
      LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
      LANGSMITH_ENDPOINT: ${{ secrets.LANGSMITH_ENDPOINT }}
      LANGSMITH_PROJECT: ${{ secrets.LANGSMITH_PROJECT }}
      LANGSMITH_TRACING: ${{ secrets.LANGSMITH_TRACING }}
      # Grafana read token for querying (instance URL via GRAFANA_INSTANCE_URL if needed)
      GRAFANA_READ_TOKEN: ${{ secrets.GRAFANA_READ_TOKEN }}
      GCLOUD_HOSTED_METRICS_ID: ${{ secrets.GCLOUD_HOSTED_METRICS_ID }}
      GCLOUD_HOSTED_METRICS_URL: ${{ secrets.GCLOUD_HOSTED_METRICS_URL }}
      GCLOUD_HOSTED_LOGS_ID: ${{ secrets.GCLOUD_HOSTED_LOGS_ID }}
      GCLOUD_HOSTED_LOGS_URL: ${{ secrets.GCLOUD_HOSTED_LOGS_URL }}
      GCLOUD_RW_API_KEY: ${{ secrets.GCLOUD_RW_API_KEY }}
      GCLOUD_OTLP_ENDPOINT: ${{ secrets.GCLOUD_OTLP_ENDPOINT }}
      GCLOUD_OTLP_AUTH_HEADER: ${{ secrets.GCLOUD_OTLP_AUTH_HEADER }}
      PYTHONUTF8: "1"

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest with coverage
        run: >-
          python -m pytest -n auto -v --cov=app --cov-report=term-missing
          --ignore=tests/e2e/kubernetes_local_alert_simulation
          --ignore=tests/synthetic
          -m "not synthetic"
        continue-on-error: false

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ runner.os }}
          path: |
            htmlcov/
            .coverage
          retention-days: 7

  # ---------------------------------------------------------------
  # Kubernetes tests: only run on push to main, or PRs whose title contains 'k8s'/'kubernetes'
  # ---------------------------------------------------------------
  test-kubernetes:
    runs-on: ubuntu-latest
    needs: [quality, typecheck]
    continue-on-error: true
    if: >-
      github.event_name == 'push' ||
      contains(github.event.pull_request.title, 'k8s') ||
      contains(github.event.pull_request.title, 'kubernetes')
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Run Kubernetes tests (kind cluster + real S3)
        run: python -m tests.e2e.kubernetes.test_local

  # ---------------------------------------------------------------
  # Thorough E2E tests: main-branch only, gated behind core jobs
  # ---------------------------------------------------------------
  test-thorough:
    runs-on: ubuntu-latest
    # Depends only on `test`; it already gates on `quality` + `typecheck` (avoids redundant edges).
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: cloudwatch-demo
            command: python3 -m tests.e2e.cloudwatch_demo.test_aws
          - name: s3-failed-python
            command: python3 -m tests.e2e.s3_failed_python_on_linux.test_aws
          - name: upstream-lambda
            command: python3 -m tests.e2e.upstream_lambda.test_agent_e2e
          - name: prefect-ecs-fargate
            command: python3 -m tests.e2e.upstream_prefect_ecs_fargate.test_agent_e2e
          - name: flink-ecs
            command: python3 -m tests.e2e.upstream_apache_flink_ecs.test_agent_e2e
    name: test-thorough (${{ matrix.name }})
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      JWT_TOKEN: ${{ secrets.JWT_TOKEN }}
      TRACER_ORG_ID: ${{ secrets.TRACER_ORG_ID }}
      TRACER_WEB_APP_URL: ${{ secrets.TRACER_WEB_APP_URL }}
      TRACER_API_URL: ${{ secrets.TRACER_API_URL }}
      TRACER_INGEST_TOKEN: ${{ secrets.TRACER_INGEST_TOKEN }}
      LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
      LANGSMITH_ENDPOINT: ${{ secrets.LANGSMITH_ENDPOINT }}
      LANGSMITH_PROJECT: ${{ secrets.LANGSMITH_PROJECT }}
      LANGSMITH_TRACING: ${{ secrets.LANGSMITH_TRACING }}
      AWS_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      CLOUDWATCH_VERIFY_LOGS: ${{ matrix.name == 'cloudwatch-demo' && '0' || '1' }}
      # Grafana read token for querying (instance URL via GRAFANA_INSTANCE_URL if needed)
      GRAFANA_READ_TOKEN: ${{ secrets.GRAFANA_READ_TOKEN }}
      GCLOUD_HOSTED_METRICS_ID: ${{ secrets.GCLOUD_HOSTED_METRICS_ID }}
      GCLOUD_HOSTED_METRICS_URL: ${{ secrets.GCLOUD_HOSTED_METRICS_URL }}
      GCLOUD_HOSTED_LOGS_ID: ${{ secrets.GCLOUD_HOSTED_LOGS_ID }}
      GCLOUD_HOSTED_LOGS_URL: ${{ secrets.GCLOUD_HOSTED_LOGS_URL }}
      GCLOUD_RW_API_KEY: ${{ secrets.GCLOUD_RW_API_KEY }}
      # Disable OTLP in test-thorough to avoid exporter connection hangs in CI
      GCLOUD_OTLP_ENDPOINT: ""
      OTEL_EXPORTER_OTLP_ENDPOINT: ""

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Install tracer CLI
        run: |
          curl -sSL https://install.tracer.cloud | CLI_BRANCH=dev sh -s user_36fbN6K6FwEgJFHsQv1pUByo8K6

      - name: Initialize tracer
        run: |
          sudo tracer init --token ${{ secrets.JWT_TOKEN }}
        timeout-minutes: 2

      - name: Export Tracer run id
        shell: bash
        run: |
          RUN_ID=$(tracer info --json | python3 -c "import sys,json; print(json.load(sys.stdin)['run']['id'])")
          PIPELINE_NAME=$(tracer info --json | python3 -c "import sys,json; print(json.load(sys.stdin)['pipeline']['name'])")
          ORG_SLUG=$(tracer info --json | python3 -c "import sys,json; print(json.load(sys.stdin)['pipeline']['organization'])")

          echo "TRACER_RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "TRACER_PIPELINE_NAME=$PIPELINE_NAME" >> $GITHUB_ENV
          echo "TRACER_ORG_SLUG=$ORG_SLUG" >> $GITHUB_ENV

          echo "TRACER_TRACE_ID=trace_$RUN_ID" >> $GITHUB_ENV

          echo "Exported TRACER_RUN_ID=$RUN_ID"
        timeout-minutes: 2

      - name: Run thorough test case
        run: ${{ matrix.command }}
        timeout-minutes: 15
        continue-on-error: false
