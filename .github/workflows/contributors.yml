name: Update Contributors

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday
  workflow_dispatch:

concurrency:
  group: contributors-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-contributors:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Fetch and sort contributors (earliest first, no bots)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'EOF'
          import sys
          import json
          import re
          import time
          import urllib.error
          import urllib.request

          headers = {
              "Authorization": "token ${{ secrets.GITHUB_TOKEN }}",
              "Accept": "application/vnd.github.v3+json",
              "User-Agent": "contributors-workflow"
          }

          BOT_LOGINS = {"dependabot", "dependabot[bot]", "github-actions", "github-actions[bot]", "copilot", "copilot[bot]"}

          def _backoff_seconds(attempt, retry_after):
              default_wait = 2 * attempt
              if not retry_after:
                  return default_wait
              try:
                  return max(default_wait, int(retry_after))
              except ValueError:
                  return default_wait

          def github_get_json(url, retries=3):
              for attempt in range(1, retries + 1):
                  req = urllib.request.Request(url, headers=headers)
                  try:
                      with urllib.request.urlopen(req) as resp:
                          body = resp.read().decode("utf-8")
                          link_header = resp.headers.get("Link", "")
                      return json.loads(body), link_header
                  except urllib.error.HTTPError as exc:
                      if exc.code in (403, 429) and attempt < retries:
                          # Back off on API throttling and retry. Respect Retry-After when present.
                          retry_after = exc.headers.get("Retry-After") if exc.headers else None
                          time.sleep(_backoff_seconds(attempt, retry_after))
                          continue
                      details = exc.read().decode("utf-8", errors="replace")
                      print(f"GitHub API error {exc.code} for {url}: {details}", file=sys.stderr)
                      raise
                  except urllib.error.URLError as exc:
                      if attempt < retries:
                          time.sleep(2 * attempt)
                          continue
                      print(f"Network error for {url}: {exc}", file=sys.stderr)
                      raise

          # Fetch all contributors
          contributors = []
          page = 1
          while True:
              url = f"https://api.github.com/repos/${{ github.repository }}/contributors?per_page=100&page={page}"
              data, _ = github_get_json(url)
              if not data:
                  break
              # Filter out bots by type and known bot usernames
              for c in data:
                  if c.get("type") == "Bot":
                      continue
                  if c["login"].lower() in BOT_LOGINS:
                      continue
                  contributors.append(c)
              page += 1

          # For each contributor, find their first commit date by paginating to the last page
          def get_first_commit_date(login):
              # GitHub API returns commits newest-first, so we need the last page
              url = f"https://api.github.com/repos/${{ github.repository }}/commits?author={login}&per_page=100"
              data, link_header = github_get_json(url)
              # If there's a last page, fetch it.
              last_url = None
              for part in link_header.split(","):
                  if 'rel="last"' in part:
                      last_url = part.split(";")[0].strip().strip("<>")
                      break
              if last_url:
                  data, _ = github_get_json(last_url)
              if data:
                  return data[-1]["commit"]["author"]["date"]
              return "9999-99-99"

          for c in contributors:
              c["first_commit"] = get_first_commit_date(c["login"])

          # Sort by first commit date ascending (earliest contributor first)
          contributors.sort(key=lambda c: c["first_commit"])

          # Build the table HTML (6 columns per row)
          cols = 6
          rows = [contributors[i:i+cols] for i in range(0, len(contributors), cols)]
          lines = ["<table>", "\t<tbody>"]
          for row in rows:
              lines.append("\t\t<tr>")
              for c in row:
                  lines.append(f"""            <td align="center">
                  <a href="{c['html_url']}">
                      <img src="{c['avatar_url']}" width="100" alt="{c['login']}"/>
                      <br />
                      <sub><b>{c['login']}</b></sub>
                  </a>
              </td>""")
              lines.append("\t\t</tr>")
          lines.append("\t</tbody>")
          lines.append("</table>")
          table = "\n".join(lines)

          # Replace the section in README.md
          with open("README.md", "r") as f:
              content = f.read()

          new_content = re.sub(
              r"<!-- readme: contributors -start -->.*?<!-- readme: contributors -end -->",
              f"<!-- readme: contributors -start -->\n{table}\n<!-- readme: contributors -end -->",
              content,
              flags=re.DOTALL
          )

          with open("README.md", "w") as f:
              f.write(new_content)

          print(f"Updated {len(contributors)} human contributors, earliest first.")
          EOF

      - name: Commit changes
        run: |
          git config user.name "contrib-readme-action"
          git config user.email "contrib-readme-action@noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "docs(contributor): contrib-readme-action has updated readme"
          if git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            git pull --rebase origin "${GITHUB_REF_NAME}"
          fi
          git push origin "HEAD:${GITHUB_REF_NAME}"
